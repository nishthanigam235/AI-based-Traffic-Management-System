<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI-TrafficSense</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body>

<header>
  🚦 <span>AI-TrafficSense</span>
</header>

<div class="container">
  <div class="left-panel">
    <div class="section-title">📊 Live Traffic Simulation</div>
    <div class="status-box" id="trafficStatus">
      ✅ Waiting for live traffic updates...
    </div>

    <div class="section-title" style="margin-top: 30px;">📈 Vehicle Counts & Charts</div>
    <div class="charts-grid">
      {% for i in range(1, 5) %}
      <div class="chart-box">
        <div class="info-box">
          🚗 Vehicle Count {{ i }}: <span id="vehicleCount{{ i }}">0</span>
          <button onclick="downloadCSV({ i });">⬇ Download CSV</button>
        </div>
        <canvas id="vehicleChart{{ i }}"></canvas>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

<div class="section-title" style="margin: 30px 20px 10px;">📹 CCTV Live Feeds & Signals</div>
<div class="cctv-grid">
  {% for i in range(1, 5) %}
  <div class="cctv-item">
    <video src="{{ url_for('static', filename='dataset/cctv' ~ i ~ '.mp4') }}" controls autoplay muted loop></video>
    <div class="camera-light">
      <div class="light red" id="red{{ i }}"></div>
      <div class="light green" id="green{{ i }}"></div>
    </div>
    <p class="light-status-text" id="lightStatus{{ i }}">🔴 Red</p>
  </div>
  {% endfor %}
</div>

</body>
</html>
